            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;

            max-width: 460px;
            width: 100%;

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            position: relative;
        }

        /* Subtle top gold accent line */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .hero {

        .logo {

            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            position: relative;
            z-index: 2;
        }

        /* Ambient pulsed ring behind logo */
        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.15;
            z-index: 1;
            filter: blur(4px);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 40%, #FFEFA6 100%);

            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;

            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
            background: var(--bg-accent);
            border: 1px solid var(--border);
            padding: 10px 22px;
            border-radius: 100px;
        }

        .stats-pulse {
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10B981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

            font-size: 1.15rem;
            font-weight: 700;
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
